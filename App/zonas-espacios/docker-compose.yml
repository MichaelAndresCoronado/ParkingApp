services:
  mysql-db:
    image: mysql:8.4
    container_name: zonas_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: zonas_espacios
    ports:
      - "3307:3306"
    volumes:
      - mysql_zonas_data:/var/lib/mysql
    networks:
      - zonas-network

volumes:
  mysql_zonas_data:

networks:
  zonas-network:
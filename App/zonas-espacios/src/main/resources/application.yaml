spring:
  application:
    name: zonas-espacios

  datasource:
    # Cambiamos a localhost y puerto 3307 para que IntelliJ pueda conectarse desde afuera
    url: jdbc:mysql://localhost:3307/zonas_espacios?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: "123"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8081